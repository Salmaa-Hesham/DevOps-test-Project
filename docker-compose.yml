services:
  backend:
    image: backend-image:latest
    container_name: backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
    restart: unless-stopped

  frontend:
    image: frontend-image:latest
    container_name: frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://192.168.233.135:5000
    depends_on:
      - backend
    restart: unless-stopped
