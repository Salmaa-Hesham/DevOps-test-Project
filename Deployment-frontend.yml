apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  labels:
    app: front-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: front-app
  template:
    metadata:
      labels:
        app: front-app
    spec:
      containers:
      - name: frontend
        image: salmahesham1114/devops-test-project:frontend
        env:
        - name: VITE_API_URL
          value: "http://192.168.233.132:31715"
        ports:
        - containerPort: 5173


